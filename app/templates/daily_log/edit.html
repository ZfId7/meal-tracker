<!--File path: app/templates/daily_log/edit.html-->

{% extends "base.html" %}

{% block title %}Edit Log Entry | Meal Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Edit Log Entry</h2>
        <p class="page-subtitle">Update the logged food entry and recalculate its nutrition.</p>
    </div>

    <div>
        <a class="btn btn-secondary" href="{{ url_for('daily_log_bp.index', entry_date=form_data.get('entry_date')) }}">Back to Daily Log</a>
    </div>
</div>

<form method="POST" class="card form-card">
    <input type="hidden" name="entry_date" value="{{ form_data.get('entry_date', '') }}">

    <div class="form-grid">
        <div class="form-group">
            <label for="meal_type">Meal Type</label>
            <select id="meal_type" name="meal_type" required>
                <option value="">-- Select Meal Type --</option>
                {% for value, label in meal_types %}
                    <option value="{{ value }}" {% if form_data.get('meal_type') == value %}selected{% endif %}>
                        {{ label }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="food_id">Food</label>
            <select id="food_id" name="food_id" required>
                <option value="">-- Select Food --</option>
                {% for food in foods %}
                    <option value="{{ food.id }}" {% if form_data.get('food_id') == (food.id|string) %}selected{% endif %}>
                        {{ food.name }}{% if food.brand %} ({{ food.brand }}){% endif %}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="amount">Amount</label>
            <input
                type="number"
                step="any"
                id="amount"
                name="amount"
                value="{{ form_data.get('amount', '') }}"
                required
            >
        </div>

        <div class="form-group">
            <label for="unit">Unit</label>
            <select id="unit" name="unit" required>
                <option value="">-- Select Unit --</option>
                {% for value, label in food_units %}
                    <option value="{{ value }}" {% if form_data.get('unit') == value %}selected{% endif %}>
                        {{ label }}
                    </option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="form-group form-group-full">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" rows="3">{{ form_data.get('notes', '') }}</textarea>
    </div>

    <div class="form-actions">
        <a class="btn btn-secondary" href="{{ url_for('daily_log_bp.index', entry_date=form_data.get('entry_date')) }}">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </div>
</form>
{% endblock %}
